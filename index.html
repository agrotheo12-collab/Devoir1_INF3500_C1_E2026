<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Success Story</title>
    <link rel="stylesheet" href="style.css">
    <!-- Intégration d'une police moderne similaire à l'exemple -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <!-- Section Gauche : Formulaire -->
        <section class="form-section">
            <header class="form-header">
                <h1>Ready to start your success story?</h1>
                <p>Signup to our website and start leafing through your favorite literature today!</p>
            </header>

            <form action="#" method="POST" class="signup-form">
                <div class="input-group">
                    <label for="fullname">Full name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Jane Doe" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="janedoe@mail.com" required>
                </div>

                <div class="input-group select-group">
                    <label for="interest" class="active-label">Area of interest</label>
                    <select id="interest" name="interest" required>
                        <option value="" disabled selected hidden>Select an area</option>
                        <option value="literature">Literature</option>
                        <option value="science">Science</option>
                        <option value="technology">Technology</option>
                        <option value="art">Art</option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="btn-submit">Sign up</button>
            </form>
        </section>

        <!-- Section Droite : Illustration -->
        <section class="illustration-section">
            <img src="images/illustration.png" alt="Illustration d'une femme tenant son certificat en main" class="responsive-img">
    </main>
 
</body>
</html>
